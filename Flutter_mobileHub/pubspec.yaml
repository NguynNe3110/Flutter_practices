name: flutter_mobilehub
description: "Project học tập tổng hợp."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # --- State Management ---
  provider: ^6.1.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.3

  # --- Networking ---
  dio: ^5.4.0
  retrofit: 4.8.0  # ✅ KHÓA CỨNG 4.8.0 (KHÔNG có dấu ^)
  json_annotation: ^4.9.0

  # --- Database ---
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # --- DI & Utils ---
  get_it: ^7.6.0
  http: ^0.13.4
  intl: ^0.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code Generation ---
  build_runner: ^2.4.13
  riverpod_generator: ^2.3.9  # ✅ Nâng lên 4.x để tương thích analyzer mới

  # Drift
  drift_dev: ^2.14.0

  # Retrofit & JSON
  retrofit_generator: ^9.0.0 # ✅ Bản 10.x đã hỗ trợ Parser.DartMappable
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/project_forecast_weather/