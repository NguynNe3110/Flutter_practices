name: flutter_mobilehub
description: "Project học tập tổng hợp."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State Management ---
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1 # Đồng bộ với flutter_riverpod

  # --- Networking ---
  dio: ^5.7.0
  retrofit: ^4.8.0 # ✅ ĐÃ MỞ KHÓA (thêm dấu ^) để tránh xung đột patch version
  json_annotation: ^4.9.0

  # --- Database ---
  drift: ^2.21.0 # ✅ Nâng lên bản 2.x mới nhất (An toàn, không vỡ API)
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # --- DI & Utils ---
  get_it: ^8.0.3 # Nâng lên 8.x để tương thích Dart 3 mới
  http: ^1.2.2
  intl: ^0.19.0
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # --- Code Generation ---
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2 # ✅ Bản 2.6.x tương thích tốt với analyzer mới

  # Drift
  drift_dev: ^2.21.0 # ✅ Đồng bộ với drift

  # Retrofit & JSON
  retrofit_generator: ^9.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/project_forecast_weather/

# 🚨 PHƯƠNG ÁN DỰ PHÒNG (SAFETY NET)
# Nếu sau khi chạy lệnh mà log vẫn báo lỗi analyzer của retrofit_generator/json_serializable,
# bạn hãy bỏ dấu # ở 2 dòng dưới đây để ÉP BUỘC analyzer dùng version mới nhất.
# dependency_overrides:
#   analyzer: ^7.0.0